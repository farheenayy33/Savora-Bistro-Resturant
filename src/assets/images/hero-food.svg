<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroFoodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6F00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E65100;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="#f5f5f5"/>
  <!-- Plate -->
  <circle cx="250" cy="250" r="180" fill="#f0f0f0" stroke="#ccc" stroke-width="3"/>
  <circle cx="250" cy="250" r="170" fill="#fff" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Main dish -->
  <ellipse cx="250" cy="200" rx="100" ry="90" fill="url(#heroFoodGrad)"/>
  <ellipse cx="230" cy="180" rx="40" ry="50" fill="#FFB74D" opacity="0.8"/>
  <ellipse cx="270" cy="190" rx="45" ry="55" fill="#FFB74D" opacity="0.7"/>
  <!-- Garnish -->
  <ellipse cx="200" cy="240" rx="35" ry="25" fill="#4CAF50" opacity="0.8"/>
  <ellipse cx="300" cy="235" rx="38" ry="28" fill="#4CAF50" opacity="0.7"/>
  <circle cx="180" cy="200" r="12" fill="#FFC107" opacity="0.6"/>
  <circle cx="320" cy="210" r="10" fill="#FFC107" opacity="0.5"/>
  <!-- Sauce drizzle -->
  <path d="M 180 260 Q 200 270 220 265" stroke="#8B4513" stroke-width="2" fill="none"/>
  <path d="M 280 260 Q 300 275 320 270" stroke="#8B4513" stroke-width="2" fill="none"/>
  <!-- Shadow -->
  <ellipse cx="250" cy="370" rx="160" ry="20" fill="#000" opacity="0.1"/>
</svg>