<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="interiorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D4037;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#3E2723"/>
  <!-- Walls -->
  <rect x="0" y="0" width="800" height="400" fill="url(#interiorGrad)"/>
  <!-- Floor -->
  <rect x="0" y="400" width="800" height="200" fill="#795548"/>
  <!-- Window -->
  <rect x="50" y="50" width="250" height="200" fill="#87CEEB" stroke="#8B4513" stroke-width="3"/>
  <line x1="175" y1="50" x2="175" y2="250" stroke="#8B4513" stroke-width="2"/>
  <line x1="50" y1="150" x2="300" y2="150" stroke="#8B4513" stroke-width="2"/>
  <!-- Chandelier -->
  <circle cx="400" cy="80" r="20" fill="#FFD700"/>
  <path d="M 400 100 L 400 150" stroke="#FFA500" stroke-width="2"/>
  <circle cx="380" cy="140" r="8" fill="#FFD700"/>
  <circle cx="420" cy="140" r="8" fill="#FFD700"/>
  <!-- Table 1 -->
  <ellipse cx="200" cy="350" rx="80" ry="60" fill="#A1887F" stroke="#6D4C41" stroke-width="2"/>
  <rect x="160" y="390" width="80" height="8" fill="#6D4C41"/>
  <!-- Table 2 -->
  <ellipse cx="550" cy="350" rx="80" ry="60" fill="#A1887F" stroke="#6D4C41" stroke-width="2"/>
  <rect x="510" y="390" width="80" height="8" fill="#6D4C41"/>
  <!-- Candles -->
  <rect x="190" y="330" width="8" height="20" fill="#FFD700"/>
  <path d="M 194 330 L 192 320 L 196 320 Z" fill="#FF6F00"/>
  <rect x="540" y="330" width="8" height="20" fill="#FFD700"/>
  <path d="M 544 330 L 542 320 L 546 320 Z" fill="#FF6F00"/>
  <!-- Ambient glow -->
  <ellipse cx="400" cy="400" rx="300" ry="200" fill="#FF6F00" opacity="0.1"/>
</svg>